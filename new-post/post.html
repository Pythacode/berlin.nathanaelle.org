<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <title>Nouveau post - 1 an à Berlin</title>
        <script src="/res/js/quill.min.js" defer></script>
        <script src="/res/js/new-post.js" defer></script>
        <link rel="stylesheet" href="/res/css/index.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/res/css/new-post.css">
        <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.6/quill.snow.css">
        <script defer src="https://statistiques.nathanaelle.org/script.js" data-website-id="5ad832be-2b05-4147-ac62-b9978d41105a"></script>
    </head>
    <body>
        <header>
            Nouveau post
        </header>
        <form action="/new-post/" method="post" enctype="multipart/form-data" id="form">
            <input type="file" name="photo">
            <div id="description"></div>
            <input type="hidden" name="description">
            <label for="height">Hauteur (en case)</label>
            <input type="number" name="height" id="height" value="1" min="1" step="1" max="5" placeholder="Valeur entre 1 & 5">
            <label for="width">Largeur (en case)</label>
            <input type="number" name="width" id="width" value="1" min="1" step="1" max="5" placeholder="Valeur entre 1 & 5">
            <input type="submit">
        </form>
    </body>
    <footer>
    </footer>
</html>
